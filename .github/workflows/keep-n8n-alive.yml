name: 🔄 Keep n8n Alive (Prevent Cold Start)

on:
  schedule:
    # Ping every 14 minutes to prevent Render free tier sleep (sleeps after 15 min)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-n8n:
    runs-on: ubuntu-latest
    steps:
      - name: 🏓 Ping n8n on Render
        run: |
          echo "Pinging n8n to prevent cold start..."
          curl -s -o /dev/null -w "Status: %{http_code}" https://n8n-h24n.onrender.com/healthz || true
          echo ""
          echo "✅ Ping sent at $(date)"
