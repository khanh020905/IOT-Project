  <ellipse cx="20" cy="22" rx="10" ry="9" fill="white"/>
  <ellipse cx="15" cy="26" rx="9" ry="7" fill="white"/>
  <ellipse cx="32" cy="26" rx="8" ry="7" fill="white"/>
  <!-- Sun behind cloud -->
  <circle cx="36" cy="14" r="8" fill="#FFB800"/>
  <circle cx="36" cy="14" r="6" fill="#FFD466"/>
  <!-- Sun rays -->
  <line x1="36" y1="3" x2="36" y2="6" stroke="#FFB800" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="22" x2="36" y2="25" stroke="#FFB800" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="25" y1="14" x2="28" y2="14" stroke="#FFB800" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="44" y1="14" x2="47" y2="14" stroke="#FFB800" stroke-width="2" stroke-linecap="round"/>
  <line x1="28.3" y1="6.3" x2="30.4" y2="8.4" stroke="#FFB800" stroke-width="2" stroke-linecap="round"/>
  <line x1="43.7" y1="6.3" x2="41.6" y2="8.4" stroke="#FFB800" stroke-width="2" stroke-linecap="round"/>
  <line x1="43.7" y1="21.7" x2="41.6" y2="19.6" stroke="#FFB800" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Rain drops -->
  <line x1="14" y1="34" x2="12" y2="40" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="34" x2="20" y2="42" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="34" x2="28" y2="40" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <!-- Thermometer accent -->
  <rect x="3" y="16" width="4" height="18" rx="2" fill="#EF4444" opacity="0.8"/>
  <circle cx="5" cy="36" r="3" fill="#EF4444" opacity="0.8"/>
  <rect x="4" y="22" width="2" height="10" rx="1" fill="#FCA5A5"/>
